<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Dinner | Invite Only</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --forest: #0B1A15;
            --copper: #B87333;
            --silk: #F7F5F0;
            --gold: #C5A059;
            --dark: #0a0a0a;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--dark);
            color: var(--silk);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Top Navigation */
        .nav-luxury {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 5%;
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.8), transparent);
            z-index: 101;
            pointer-events: auto;
        }

        .nav-brand {
            font-family: 'EB Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: var(--silk);
            cursor: pointer;
            letter-spacing: 0.05em;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            align-items: center;
        }

        .nav-link {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--silk);
            opacity: 0.5;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            text-decoration: none;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--gold);
            letter-spacing: 0.2em;
        }

        /* Chapter Text Layout */
        .chapter-info {
            position: fixed;
            top: 50%;
            left: 8%;
            transform: translateY(-50%);
            max-width: 500px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .chapter-title {
            font-family: 'EB Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
