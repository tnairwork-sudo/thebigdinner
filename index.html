<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Dinner | Invite Only</title>
    <!-- Cinematic Typography -->
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --forest: #0B1A15;
            --silk: #F7F5F0;
            --gold: #C5A059;
            --dark: #0a0a0a;
            --copper: #B87333;
        }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--dark);
            color: var(--silk);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Scroll is managed by the 3D travel logic via Spacer */
            -webkit-font-smoothing: antialiased;
        }

        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; background: var(--dark);
        }

        /* UI Overlays */
        .ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .nav-luxury {
            position: fixed; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 2.5rem 5%; background: linear-gradient(to bottom, rgba(10, 10, 10, 0.9), transparent);
            z-index: 101; pointer-events: auto;
        }
        .nav-brand {
            font-family: 'EB Garamond', serif; font-size: 1.6rem; font-style: italic;
            color: var(--silk); letter-spacing: 0.05em; cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }
        .nav-link {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--silk);
            opacity: 0.7;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }
        .nav-link:hover {
            opacity: 1;
            color: var(--gold);
        }

        /* Chapter Text Layout */
        .chapter-info {
            position: fixed; top: 50%; left: 8%; transform: translateY(-50%);
            max-width: 500px; z-index: 50; opacity: 0;
            transition: opacity 0.8s ease, transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
        }
        .chapter-title {
            font-family: 'EB Garamond', serif; font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-style: italic; color: var(--gold); line-height: 1.1; margin-bottom: 1rem;
        }
        .chapter-subtitle {
            font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--silk); opacity: 0.6; margin-bottom: 1.5rem;
        }
        .chapter-description {
            font-size: 1.1rem; line-height: 1.8; color: var(--silk); opacity: 0.8; font-weight: 300;
        }

        /* AI Feature Dock */
        .ai-dock {
            position: fixed; bottom: 3rem; right: 5%; z-index: 150;
            display: flex; flex-direction: column; gap: 1rem; pointer-events: auto;
        }
        .btn-ai {
            border: 1px solid rgba(197, 160, 89, 0.3); padding: 0.8rem 1.5rem;
            font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
            background: rgba(10, 10, 10, 0.6); color: var(--silk); cursor: pointer;
            backdrop-filter: blur(12px); transition: 0.5s ease;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .btn-ai:hover { border-color: var(--gold); background: var(--gold); color: var(--forest); }

        /* Modal for AI Responses */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 1000; display: none; align-items: center; justify-content: center;
            pointer-events: auto;
        }
        .ai-modal {
            background: var(--forest); border: 1px solid var(--gold);
            padding: 3rem; width: 90%; max-width: 500px;
            display: flex; flex-direction: column; gap: 1.5rem;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }
        .modal-overlay.active { display: flex; }
        .ai-result { font-family: 'EB Garamond', serif; font-size: 1.2rem; font-style: italic; color: var(--silk); min-height: 60px; line-height: 1.6; }
        .ai-input { background: transparent; border: none; border-bottom: 1px solid rgba(247,245,240,0.2); color: var(--silk); padding: 1rem 0; width: 100%; outline: none; font-family: 'EB Garamond', serif; font-size: 1.3rem; }

        .btn-luxury { border: 1px solid var(--gold); padding: 1rem 2.5rem; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; background: transparent; color: var(--gold); cursor: pointer; transition: 0.4s ease; }
        .btn-luxury:hover { background: var(--gold); color: var(--forest); }

        /* Interaction Elements */
        .scroll-spacer { height: 1000vh; pointer-events: none; }
        .scroll-indicator { position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%); z-index: 50; opacity: 1; transition: 0.6s ease; }
        .scroll-indicator-text { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--silk); opacity: 0.4; }

        .action-layer {
            position: fixed; bottom: 10%; left: 8%; z-index: 150;
            display: flex; gap: 1.5rem; opacity: 0; pointer-events: none; transition: 1s ease;
        }

        @media (max-width: 768px) {
            .chapter-info { left: 5%; right: 5%; text-align: center; }
            .ai-dock { bottom: 2rem; right: 50%; transform: translateX(50%); flex-direction: row; width: 90%; }
            .btn-ai { flex: 1; padding: 0.6rem; font-size: 0.55rem; }
            .action-layer { flex-direction: column; left: 50%; transform: translateX(-50%); bottom: 15%; width: 80%; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="ui-overlay">
    <nav class="nav-luxury">
        <div class="nav-brand">The Big Dinner</div>
        <div class="nav-links" style="pointer-events: auto;">
            <span class="nav-link" onclick="scrollToChapter(2)">Chronicles</span>
            <span class="nav-link" onclick="scrollToChapter(4)">Philosophy</span>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <span class="nav-link" onclick="scrollToChapter(6)">Apply</span>
        </div>
    </nav>

    <div class="chapter-info" id="chapterInfo">
        <h1 class="chapter-title" id="chapterTitle">Invite Only</h1>
        <p class="chapter-subtitle" id="chapterSubtitle">London · Delhi · Mumbai</p>
        <p class="chapter-description" id="chapterDescription">Curation is the only filter. We gather the people, not the network.</p>
    </div>

    <!-- AI Feature Dock -->
    <div class="ai-dock">
        <button class="btn-ai" onclick="openAi('muse')">✨ Philosophical Muse</button>
        <button class="btn-ai" onclick="openAi('curator')">✨ Curator's Lens</button>
    </div>

    <div class="action-layer" id="actionLayer">
        <a href="https://forms.gle/vGGAHKJGr3yNK25b6" target="_blank" style="text-decoration:none">
            <button class="btn-luxury">Apply for Entry</button>
        </a>
        <a href="https://www.instagram.com/thebigdinnerr/" target="_blank" style="text-decoration:none">
            <button class="btn-luxury">Instagram</button>
        </a>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
        <div class="scroll-indicator-text">Scroll to travel</div>
    </div>
</div>

<!-- Modal UI -->
<div class="modal-overlay" id="modalOverlay" onclick="closeAi()">
    <div class="ai-modal" id="aiModal" onclick="event.stopPropagation()">
        <h2 id="modalTitle" style="font-family: 'EB Garamond', serif; color: var(--gold); font-style: italic; font-size: 2rem;">The Oracle</h2>
        <div id="inputSection">
            <p style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.5; margin-bottom: 0.5rem;">Describe the seeker of entry</p>
            <input type="text" id="aiInput" class="ai-input" placeholder="e.g. A digital architect from Tokyo..." autocomplete="off">
        </div>
        <div class="ai-result" id="aiResult">Whisper your query into the digital void.</div>
        <button class="btn-luxury" onclick="runAi()" style="width: 100%; margin-top: 1rem;">Consult the Oracle</button>
        <button class="btn-luxury" style="border:none; font-size: 0.6rem; opacity: 0.5; margin-top: 1rem; width: 100%;" onclick="closeAi()">Close</button>
    </div>
</div>

<div class="scroll-spacer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const Colors = { forest: 0x0B1A15, copper: 0xB87333, gold: 0xC5A059, dark: 0x0a0a0a, silk: 0xF7F5F0 };
    const chapters = [
        { title: 'Invite Only', sub: 'A Global Table', desc: 'Curation is the only filter. We gather the people, not the network. A digital velvet rope.' },
        { title: 'Taj Palace', sub: 'The Experiment', desc: 'October 2025. A room where character takes precedence over credentials. The start of it all.' },
        { title: 'London', sub: 'Heritage Chapter', desc: 'Expansion was built on trust, not geography. The table remains the same regardless of the skyline.' },
        { title: 'Harbour Bar', sub: 'Mumbai 2026', desc: 'A historic evening at the Taj Mahal Palace. April 17, 2026. A cinematic memory.' },
        { title: 'Trust', sub: 'The Compounding', desc: 'Real friendships form the value that no algorithm could ever engineer alone.' },
        { title: 'Seek Entry', sub: 'The Next Room', desc: 'Entry is by application only. Curation is our only condition. Tell us why you belong.' }
    ];

    // --- ✨ Gemini API Integration ---
    const apiKey = ""; 
    let activeMode = null;

    async function callGemini(prompt, sys) {
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }], 
                    systemInstruction: { parts: [{ text: sys }] } 
                })
            });
            const d = await resp.json();
            return d.candidates?.[0]?.content?.parts?.[0]?.text || "The oracle remains silent.";
        } catch(e) { return "The stars are obscured. Please try again."; }
    }

    function openAi(m) {
        activeMode = m;
        document.getElementById('modalOverlay').classList.add('active');
        document.getElementById('modalTitle').innerText = m === 'muse' ? "Philosophical Muse" : "Curator's Lens";
        document.getElementById('inputSection').style.display = m === 'muse' ? 'none' : 'block';
        document.getElementById('aiResult').innerText = "Whisper your query into the digital void.";
    }

    function closeAi() { document.getElementById('modalOverlay').classList.remove('active'); }

    async function runAi() {
        const res = document.getElementById('aiResult');
        const inp = document.getElementById('aiInput').value;
        res.innerText = "Processing...";
        
        const system = activeMode === 'muse' 
            ? "You are the Philosophical Muse of 'The Big Dinner'. Generate a one-line profound manifesto about luxury, trust, or the art of gathering. Tone: Quiet Luxury, high-end, cinematic." 
            : "You are the Chief Curator for 'The Big Dinner'. Analyze this guest profile and explain in 2 short, sophisticated sentences why they fit an exclusive trust-based room.";
        
        const prompt = activeMode === 'muse' ? "Give me a manifesto for tonight." : `Profile: ${inp || "A silent observer with a taste for the exquisite."}`;
        
        res.innerText = await callGemini(prompt, system);
    }

    // --- 3D Engine Initialization ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(Colors.dark);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const monoliths = [];
    chapters.forEach((ch, i) => {
        const group = new THREE.Group();
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(10, 16, 2), 
            new THREE.MeshStandardMaterial({ 
                color: i % 2 ? Colors.copper : Colors.forest, 
                metalness: 0.6, 
                roughness: 0.15,
                emissive: i % 2 ? Colors.copper : Colors.forest,
                emissiveIntensity: 0.1
            })
        );
        group.add(mesh);

        // Gold Structural Detail
        const accent = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 16, 0.1),
            new THREE.MeshBasicMaterial({ color: Colors.gold })
        );
        accent.position.set(-5.05, 0, 1.05);
        group.add(accent);

        group.position.z = -i * 35;
        scene.add(group);
        monoliths.push(group);
    });

    // Environmental Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const point = new THREE.PointLight(Colors.gold, 2.5, 120);
    point.position.set(15, 15, 20);
    scene.add(point);

    // Dynamic Dust Particles
    const dustCount = 1000;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    for(let i=0; i<dustCount*3; i++) dustPos[i] = (Math.random() - 0.5) * 200;
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({ color: Colors.gold, size: 0.05, transparent: true, opacity: 0.3 }));
    scene.add(dust);

    let scrollProgress = 0;
    window.addEventListener('scroll', () => {
        const h = document.documentElement, b = document.body;
        scrollProgress = (h.scrollTop || b.scrollTop) / (h.scrollHeight - h.clientHeight);
    }, { passive: true });

    function scrollToChapter(i) {
        window.scrollTo({ top: (i / (chapters.length - 1)) * (document.body.scrollHeight - window.innerHeight), behavior: 'smooth' });
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Travel through monoliths
        const targetZ = -scrollProgress * (chapters.length - 1) * 35 + 20;
        camera.position.z += (targetZ - camera.position.z) * 0.055;
        camera.position.y = 2.5 + Math.sin(scrollProgress * Math.PI * 4) * 0.8;
        camera.lookAt(0, 0, camera.position.z - 25);

        // Textual Logic
        const idx = Math.round(scrollProgress * (chapters.length - 1));
        const data = chapters[idx];
        const info = document.getElementById('chapterInfo');
        const progInChapter = (scrollProgress * (chapters.length - 1)) % 1;
        const isAtStart = scrollProgress < 0.005;
        const opacity = isAtStart || (progInChapter >= 0.1 && progInChapter <= 0.9) ? 1 : 0;

        info.style.opacity = opacity;
        if(opacity > 0.5) {
            document.getElementById('chapterTitle').innerText = data.title;
            document.getElementById('chapterSubtitle').innerText = data.sub;
            document.getElementById('chapterDescription').innerText = data.desc;
        }

        document.getElementById('scrollIndicator').style.opacity = scrollProgress < 0.05 ? 1 : 0;
        document.getElementById('actionLayer').style.opacity = scrollProgress > 0.92 ? 1 : 0;
        document.getElementById('actionLayer').style.pointerEvents = scrollProgress > 0.92 ? 'auto' : 'none';
        
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
