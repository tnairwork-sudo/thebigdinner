<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Dinner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --forest: #0B1A15;
            --silk: #F7F5F0;
            --gold: #C5A059;
            --dark: #0a0a0a;
            --copper: #B87333;
        }
        body {
            background-color: var(--dark);
            color: var(--silk);
            font-family: 'Times New Roman', serif; /* Elegant fallback */
            height: 500vh; /* Scroll room */
            overflow-x: hidden;
        }
        /* The Cinematic Background */
        .stage {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            perspective: 1000px;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            z-index: 1;
        }
        /* The CSS Monolith */
        .monolith {
            position: absolute;
            width: 200px; height: 300px;
            background: var(--forest);
            border-left: 2px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s linear, opacity 0.5s ease;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        /* UI Layer */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            padding: 3rem;
        }
        .nav-brand { font-size: 1.5rem; font-style: italic; color: var(--silk); }
        .content {
            position: absolute; top: 50%; left: 10%;
            transform: translateY(-50%); max-width: 400px;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .active-text { opacity: 1; }
        h1 { font-size: 3rem; color: var(--gold); font-style: italic; margin-bottom: 1rem; }
        p { font-size: 1.1rem; line-height: 1.6; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="stage" id="stage">
        <div class="monolith" id="monolith">
            <div style="color: var(--gold); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;">The Big Dinner</div>
        </div>
    </div>

    <div class="overlay">
        <div class="nav-brand">The Big Dinner</div>
        <div class="content" id="textContent">
            <h1 id="title">Invite Only</h1>
            <p id="desc">Curation is the only filter. We gather the people, not the network.</p>
        </div>
    </div>

    <script>
        const chapters = [
            { title: 'Invite Only', desc: 'Curation is the only filter.', color: '#0B1A15' },
            { title: 'The Experiment', desc: 'October 2025. Blue Bar, Taj Palace.', color: '#B87333' },
            { title: 'London', desc: 'February 2026. A global extension of trust.', color: '#0B1A15' },
            { title: 'Mumbai', desc: 'April 2026. The Harbour Bar.', color: '#B87333' },
            { title: 'Seek Entry', desc: 'The next room is being built.', color: '#0B1A15' }
        ];

        const monolith = document.getElementById('monolith');
        const textContent = document.getElementById('textContent');
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');

        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY / (document.body.scrollHeight - window.innerHeight);
            
            // 3D Travel Effect
            const zTranslate = scrolled * 2000 - 500;
            const yRotate = Math.sin(scrolled * 10) * 10;
            monolith.style.transform = `translateZ(${zTranslate}px) rotateY(${yRotate}deg)`;
            
            // Opacity fade when "passing" the monolith
            monolith.style.opacity = zTranslate > 400 ? 0 : 1;

            // Chapter Logic
            const index = Math.min(Math.floor(scrolled * chapters.length), chapters.length - 1);
            title.innerText = chapters[index].title;
            desc.innerText = chapters[index].desc;
            monolith.style.backgroundColor = chapters[index].color;

            // Show text in middle of travel
            const localScroll = (scrolled * chapters.length) % 1;
            textContent.className = (localScroll > 0.2 && localScroll < 0.8) ? 'content active-text' : 'content';
        });
    </script>
</body>
</html>
