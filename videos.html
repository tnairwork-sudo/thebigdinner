<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Dinner | Videos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --forest: #0B1A15;
            --copper: #B87333;
            --silk: #F7F5F0;
            --gold: #C5A059;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--forest);
            color: var(--silk);
            font-family: 'Inter', sans-serif;
        }

        .serif { font-family: 'EB Garamond', serif; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000; opacity: 0.12;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        }

        .nav-luxury {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 2.5rem 5%; z-index: 1500; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(8, 18, 14, 0.95), transparent);
        }
        .nav-link {
            font-size: 11px; letter-spacing: 0.5em; text-transform: uppercase;
            cursor: pointer; color: var(--silk); opacity: 0.6;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            text-decoration: none;
        }
        .nav-link:hover, .nav-link.active { opacity: 1; color: var(--gold); }

        .page-header {
            padding: 22vh 5% 5vh;
            text-align: center;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            flex-wrap: wrap;
            padding: 1.5rem 5%;
            position: sticky;
            top: 0;
            z-index: 900;
            background: linear-gradient(to bottom, var(--forest) 75%, transparent);
        }

        .filter-tab {
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            padding: 0.55rem 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: var(--silk);
            opacity: 0.45;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .filter-tab:hover { opacity: 0.8; }
        .filter-tab.active {
            border-color: var(--gold);
            color: var(--gold);
            opacity: 1;
        }

        .video-feed {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5rem;
            padding: 2rem 5% 10rem;
        }

        .video-card {
            width: 100%;
            max-width: 440px;
            opacity: 0;
            transform: translateY(48px);
            transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .video-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            background: #060e0b;
            cursor: pointer;
        }

        .video-wrapper .thumb {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.68) saturate(0.85);
            transform: scale(1.04);
            transition:
                filter   0.8s ease,
                transform 1.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .video-card:hover .thumb {
            filter: brightness(0.82) saturate(1);
            transform: scale(1.09);
        }

        .card-meta-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 5rem 1.4rem 1.4rem;
            background: linear-gradient(to top, rgba(6, 14, 11, 0.93) 0%, transparent 100%);
            pointer-events: none;
        }
        .card-city-tag {
            font-size: 10px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.35rem;
        }
        .card-venue {
            font-family: 'EB Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.15;
            margin-bottom: 0.35rem;
        }
        .card-chapter {
            font-size: 9px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.45;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-btn {
            width: 60px; height: 60px;
            border: 1.5px solid rgba(247, 245, 240, 0.55);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
            background: rgba(11, 26, 21, 0.25);
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .play-btn:hover {
            border-color: var(--gold);
            background: rgba(197, 160, 89, 0.18);
            transform: scale(1.12);
        }
        .play-btn svg {
            margin-left: 4px;
            fill: var(--silk);
            width: 20px; height: 20px;
        }

        .card-description {
            padding: 1.1rem 0 0;
            font-size: 0.82rem;
            line-height: 1.8;
            opacity: 0.6;
            font-weight: 300;
        }
        .card-footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }
        .guest-pill {
            font-size: 9px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.4;
        }
        .city-pill {
            font-size: 9px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--copper);
            opacity: 0.7;
        }

        #load-sentinel {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
        }
        .spinner {
            display: none;
            width: 22px; height: 22px;
            border: 1.5px solid rgba(197, 160, 89, 0.18);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .end-note {
            display: none;
            text-align: center;
            font-size: 9px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            opacity: 0.28;
            padding: 2rem 0 5rem;
        }
        .end-note.visible { display: block; }

        @media (max-width: 480px) {
            .video-card  { max-width: 100%; }
            .video-feed  { padding: 1rem 0 8rem; gap: 3.5rem; }
            .card-description,
            .card-footer-row { padding-left: 1rem; padding-right: 1rem; }
        }

        .footer-minimal {
            text-align: center;
            padding: 6vh 5%;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <nav class="nav-luxury">
        <a href="index.html" style="text-decoration: none;">
            <div class="serif italic text-2xl uppercase tracking-tighter cursor-pointer" style="color: var(--silk);">The Big Dinner</div>
        </a>
        <div class="flex gap-8 md:gap-12 lg:gap-16 items-center">
            <a href="index.html"   class="nav-link hidden md:inline-block">Home</a>
            <a href="gallery.html" class="nav-link hidden md:inline-block">Gallery</a>
            <span class="nav-link active">Videos</span>
        </div>
    </nav>

    <header class="page-header" id="page-header">
        <p id="header-eyebrow"
           style="font-size:11px; letter-spacing:0.5em; text-transform:uppercase; color:var(--copper); margin-bottom:1.5rem;">
            The Moving Image
        </p>
        <h1 id="header-title" class="serif italic" style="font-size:clamp(3.5rem,10vw,7rem); line-height:0.95; margin:0;">
            In Motion.
        </h1>
    </header>

    <div class="filter-bar">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="Delhi">Delhi</button>
        <button class="filter-tab" data-filter="Mumbai">Mumbai</button>
        <button class="filter-tab" data-filter="London">London</button>
        <button class="filter-tab" data-filter="Dubai">Dubai</button>
    </div>

    <main class="video-feed" id="video-feed" aria-label="Video reel feed"></main>

    <div id="load-sentinel" aria-hidden="true">
        <div class="spinner" id="spinner"></div>
    </div>
    <p class="end-note" id="end-note">— End of the Archives —</p>

    <footer class="footer-minimal">
        <div style="font-size:10px; letter-spacing:0.8em; text-transform:uppercase; opacity:0.5; margin-bottom:0.5rem;">
            Architected by Nair and Sahani
        </div>
        <div style="font-size:9px; letter-spacing:0.4em; text-transform:uppercase; opacity:0.3;">
            The Big Dinner © 2026
        </div>
    </footer>

    <script>
        const ALL_VIDEOS = [
            {
                id: 1,
                city: "Delhi",
                chapter: "Chapter I",
                date: "October 2025",
                venue: "Blue Bar, Taj Palace",
                guestCount: 40,
                description: "The first room. Forty people, no chairs, no agenda, no name tags. A bet on conversation placed inside the oldest bar in New Delhi.",
                videoUrl: "YOUR_VIDEO_URL_HERE",
                thumbnail: "shangrila.jpeg"
            },
            {
                id: 2,
                city: "Delhi",
                chapter: "Chapter II",
                date: "November 2025",
                venue: "Megu, The Leela Palace",
                guestCount: 36,
                description: "The second chapter deepened the experiment. Familiar faces, unfamiliar territory. The Japanese room at The Leela asked something different of everyone.",
                videoUrl: "YOUR_VIDEO_URL_HERE",
                thumbnail: "november3.jpeg"
            },
            {
                id: 3,
                city: "Delhi",
                chapter: "Chapter III",
                date: "December 2025",
                venue: "Megu, The Leela Palace",
                guestCount: 42,
                description: "December brought a different energy. The year ending, the room fuller. The conversations turned inward.",
                videoUrl: "YOUR_VIDEO_URL_HERE",
                thumbnail: "dec11.jpeg"
            },
            {
                id: 4,
                city: "Delhi",
                chapter: "Chapter IV",
                date: "January 2026",
                venue: "The Imperial Hotel",
                guestCount: 38,
                description: "The Imperial held something classical. New year, new people — but the same idea at the centre of it all.",
                videoUrl: "YOUR_VIDEO_URL_HERE",
                thumbnail: "jan1.jpeg"
            },
            {
                id: 5,
                city: "Delhi",
                chapter: "Chapter V",
                date: "February 2026",
                venue: "Shangri-La Eros",
                guestCount: 44,
                description: "The city's most recognisable room. Something about its familiarity made the conversations sharper.",
                videoUrl: "YOUR_VIDEO_URL_HERE",
                thumbnail: "sbhangrila.jpeg"
            },
            {
                id: 6,
                city: "Delhi",
                chapter: "Chapter VI",
                date: "March 2026",
                venue: "Ottimo, ITC Maurya",
                guestCount: 40,
                description: "The final Delhi chapter before the expansion. The ITC Maurya asked the room to dress for the occasion.",
                videoUrl: "YOUR_VIDEO_URL_HERE",
                thumbnail: "itcmaurya.jpeg"
            },
            {
                id: 7,
                city: "Mumbai",
                chapter: "Chapter VII",
                date: "April 2026",
                venue: "Harbour Bar, The Taj Mahal Palace",
                guestCount: 45,
                description: "The first room outside Delhi. Mumbai asked new questions. The harbour lit the table differently.",
                videoUrl: "YOUR_VIDEO_URL_HERE",
                thumbnail: "bombay1.jpg"
            },
            {
                id: 8,
                city: "London",
                chapter: "London I",
                date: "February 2026",
                venue: "London",
                guestCount: 30,
                description: "Expansion was never about geography. It was about trust. Devansh and Shaurya held the room.",
                videoUrl: "YOUR_VIDEO_URL_HERE",
                thumbnail: "lodnon.jpeg"
            }
        ];

        const PAGE_SIZE   = 3;
        let currentFilter = "all";
        let currentPage   = 0;
        let isLoading     = false;
        let allLoaded     = false;

        const feed    = document.getElementById('video-feed');
        const spinner = document.getElementById('spinner');
        const endNote = document.getElementById('end-note');

        function getFilteredVideos() {
            return currentFilter === "all"
                ? ALL_VIDEOS
                : ALL_VIDEOS.filter(v => v.city === currentFilter);
        }

        function resetFeed() {
            currentPage = 0;
            allLoaded   = false;
            feed.innerHTML = "";
            endNote.classList.remove('visible');
        }

        function buildCard(video) {
            const article = document.createElement('article');
            article.className = 'video-card';
            article.dataset.city = video.city;

            article.innerHTML = `
                <div class="video-wrapper" onclick="handlePlay(${video.id})" role="button"
                     aria-label="Watch ${video.chapter} — ${video.city}, ${video.date}">
                    <img
                        class="thumb"
                        src="${video.thumbnail}"
                        alt="${video.city} dinner — ${video.date}"
                        loading="lazy"
                    >
                    <div class="card-meta-overlay">
                        <p class="card-city-tag">${video.city} &mdash; ${video.date}</p>
                        <h2 class="card-venue">${video.venue}</h2>
                        <p class="card-chapter">${video.chapter}</p>
                    </div>
                    <div class="play-overlay">
                        <div class="play-btn" aria-hidden="true">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <polygon points="6,3 21,12 6,21"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <p class="card-description">${video.description}</p>
                <div class="card-footer-row">
                    <span class="guest-pill">${video.guestCount} Guests</span>
                    <span class="city-pill">${video.chapter}</span>
                </div>
            `;

            return article;
        }

        function loadNextBatch() {
            if (isLoading || allLoaded) return;
            isLoading = true;
            spinner.classList.add('active');

            setTimeout(() => {
                const filtered = getFilteredVideos();
                const start    = currentPage * PAGE_SIZE;
                const batch    = filtered.slice(start, start + PAGE_SIZE);

                if (batch.length === 0) {
                    allLoaded = true;
                    spinner.classList.remove('active');
                    endNote.classList.add('visible');
                    isLoading = false;
                    return;
                }

                batch.forEach((video, i) => {
                    const card = buildCard(video);
                    feed.appendChild(card);
                    setTimeout(() => entranceObserver.observe(card), i * 80);
                });

                currentPage++;
                spinner.classList.remove('active');
                isLoading = false;

                if (currentPage * PAGE_SIZE >= filtered.length) {
                    allLoaded = true;
                    endNote.classList.add('visible');
                }
            }, 500);
        }

        const entranceObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    entranceObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.08 });

        const sentinelObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !allLoaded) {
                loadNextBatch();
            }
        }, { rootMargin: '300px' });

        sentinelObserver.observe(document.getElementById('load-sentinel'));

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab')
                    .forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                resetFeed();
                loadNextBatch();
            });
        });

        function handlePlay(id) {
            const video = ALL_VIDEOS.find(v => v.id === id);
            if (!video) return;
            if (video.videoUrl && video.videoUrl !== "YOUR_VIDEO_URL_HERE") {
                window.open(video.videoUrl, '_blank', 'noopener,noreferrer');
            }
        }

        gsap.from(["#header-eyebrow", "#header-title"], {
            y: 30, opacity: 0, duration: 1.4, stagger: 0.15,
            ease: "power3.out", delay: 0.1
        });

        loadNextBatch();
    </script>
</body>
</html>
